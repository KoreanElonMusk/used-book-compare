<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="알라딘, 예스24, 개똥이네 중고책 가격을 한눈에 비교하세요. 가장 저렴한 중고책을 빠르게 찾아드립니다.">
  <title>책저가 - 중고책 가격 비교</title>
  <link rel="stylesheet" href="/static/style.css?v=9">
  <!-- Favicon (책 이모지) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
  <div class="app-container">

    <!-- ── 헤더 ── -->
    <header class="header">
      <div class="header__logo">
        <img src="/static/logo.png" alt="책저가 심볼" class="header__symbol">
        <h1 class="header__title">책저가</h1>
      </div>
      <p class="header__subtitle">알라딘, 예스24, 개똥이네 중고책을 한눈에 비교하세요</p>
    </header>

    <!-- ── 검색 영역 ── -->
    <section class="search-section">
      <div class="search-card">
        <form id="search-form" class="search-form" role="search">
          <div class="search-input-wrapper">
            <input
              type="text"
              id="search-input"
              class="search-input"
              placeholder="책 제목 또는 ISBN을 입력하세요"
              autocomplete="off"
              aria-label="책 검색"
            >
          </div>
          <button type="submit" id="search-btn" class="search-btn">검색</button>
        </form>
      </div>

      <!-- 에러 배너 -->
      <div id="error-banner" class="error-banner">
        <span id="error-text"></span>
      </div>
    </section>

    <!-- ── 로딩 표시 ── -->
    <div id="loading" class="loading">
      <div class="loading__spinner"></div>
      <p class="loading__text">데이터를 수집 중입니다<span class="loading__dots"></span></p>
    </div>

    <!-- ── 검색 결과 ── -->
    <section id="results-section" class="results-section">
      <div class="results-header">
        <div class="controls-wrapper" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; width: 100%;">
          <h2 class="results-header__title">
            "<span id="query-display"></span>" 검색 결과
          </h2>
          <div class="sort-wrapper">
            <select id="sort-select" class="sort-select" style="padding: 8px 12px; border-radius: 8px; background: var(--bg-input); border: 1px solid var(--border-subtle); color: var(--text-primary); outline: none;">
              <option value="accuracy">정확도 순</option>
              <option value="price_asc">낮은 가격 순</option>
              <option value="price_desc">높은 가격 순</option>
            </select>
          </div>
        </div>
        <span id="results-count" class="results-header__count"></span>
      </div>

      <!-- 결과 카드 리스트 (테이블 대신 카드형 레이아웃) -->
      <div id="results-list" class="results-list">
        <!-- JavaScript로 동적 렌더링 -->
      </div>
    </section>

    <!-- ── 푸터 ── -->
    <footer class="footer">
      <p class="footer__text">
        © 2026 BookCompare — 중고책 가격 비교 서비스 프로토타입
        <br>가격 정보는 실시간 수집 결과이며, 실제와 다를 수 있습니다.
      </p>
    </footer>

  </div>

  <script src="/static/script.js?v=4"></script>
</body>
</html>
